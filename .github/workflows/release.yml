name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  pack:
    name: npm pack
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pack
        run: npm pack

      - name: Create release and upload tarball
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARBALL=$(ls *.tgz)
          gh release create "${{ github.ref_name }}" "$TARBALL" \
            --title "${{ github.ref_name }}" \
            --generate-notes
